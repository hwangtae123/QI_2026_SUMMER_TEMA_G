<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCSD QI Team G</title>
  <meta name="description" content="UCSD QI 2026 Summer — Team G 소개 페이지" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===== Header / Nav ===== -->
  <header class="site-header">
    <div class="container nav">
      <a href="#home" class="logo">QI · Team G</a>
      <nav class="nav-links">
        <a href="#about">About</a>
        <a href="#members">Members</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- ===== Hero ===== -->
  <section id="home" class="hero">
    <div class="container">
      <p class="hero-eyebrow">UCSD · QI 2026 Summer</p>
      <h1 class="hero-title">Team G</h1>
      <p class="hero-subtitle">
        더 나은 문제 해결을 위해 모인 다섯 명의 팀을 소개합니다.
      </p>
      <a href="#members" class="btn">멤버 만나보기</a>
    </div>
  </section>

  <!-- ===== About ===== -->
  <section id="about" class="section">
    <div class="container">
      <h2 class="section-title">About Us</h2>
      <p class="section-lead">
        여기에 팀 소개, 프로젝트 목표, 활동 방향을 적어주세요.
        (예: 우리 팀은 ~을 목표로 하며, ~한 프로젝트를 진행합니다.)
      </p>
    </div>
  </section>

  <!-- ===== Members ===== -->
  <section id="members" class="section section-alt">
    <div class="container">
      <h2 class="section-title">Members</h2>
      <div id="member-grid" class="member-grid">
        <!-- 멤버 카드는 js/members.js 데이터로 자동 생성됩니다 -->
      </div>
    </div>
  </section>

  <!-- ===== Contact ===== -->
  <section id="contact" class="section">
    <div class="container">
      <h2 class="section-title">Contact</h2>
      <p class="section-lead">문의: <a href="mailto:ty5321@kyonggi.ac.kr">ty5321@kyonggi.ac.kr</a></p>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 UCSD QI Team G. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/members.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
